name: driver-ci

on:
  push:
  pull_request:
  schedule:
    - cron: "0 2 * * *"

jobs:
  build-and-test:
    runs-on: [self-hosted, windows, wdk]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Community\Common7\Tools\VsDevCmd.bat"
          msbuild WDUTF.sln /p:Configuration=Debug /p:Platform=x64 /m

      - name: Unit tests
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Community\Common7\Tools\VsDevCmd.bat"
          vstest.console.exe build\Target\Debug-amd64\vsTest\BasicDriverUnitTest.dll /Logger:trx /ResultsDirectory:results

      - uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: results\*.trx

  fuzz-smoke:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4

      - name: Build fuzz image
        run: docker build -t driver-fuzz fuzz/

      - name: Smoke fuzz 60s
        run: |
          docker run --name fuzz-run --entrypoint afl-fuzz driver-fuzz \
            -i /corpus -o /findings -V 60 -- /fuzz/harness @@ || true
          docker cp fuzz-run:/findings/default ./findings || true
          docker rm fuzz-run || true
          echo "=== findings ==="
          ls -la findings/ || echo "findings empty"
          ls -la findings/crashes/ 2>/dev/null || echo "no crashes dir"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fuzz-findings
          path: findings/
          if-no-files-found: warn
